<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOSW Reaction</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 24px; background:#111; color:white; }
    button { cursor:pointer; }
    .emoji, .quad {
      font-size: 36px; margin: 8px; padding: 14px 18px;
      border-radius: 14px; border: 2px solid #555; background:#222; color:white;
    }
    .quad { font-size: 22px; }
    .selected { border-color:white; background:#555; }
    .send, .done {
      margin-top: 24px; font-size: 22px; padding: 14px 32px;
      border-radius: 12px; border:none; color:white;
    }
    .send { background:#ff4081; }
    .done { background:#00c853; display:none; }
    #status { margin-top:18px; color:#ccc; min-height: 1.5em; }
    #sentBox {
      display:none;
      margin-top: 28px;
      padding: 20px;
      border: 2px solid #00c853;
      border-radius: 16px;
      background: #18251d;
    }
  </style>
</head>
<body>
  <h1>リアクション送信</h1>

  <h2>絵文字</h2>
  <button class="emoji" data-emoji="☺️">☺️</button>
  <button class="emoji" data-emoji="💗">💗</button>
  <button class="emoji" data-emoji="👍">👍</button>

  <h2>表示位置</h2>
  <button class="quad" data-quad="NW">左上</button>
  <button class="quad" data-quad="NE">右上</button><br>
  <button class="quad" data-quad="SW">左下</button>
  <button class="quad" data-quad="SE">右下</button>

  <br>
  <button class="send" id="sendBtn">送信</button>

  <div id="status">絵文字と位置を選んでください</div>

  <div id="sentBox">
    <h2 id="sentMessage">送信完了</h2>
    <button class="done" id="doneBtn">完了</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // ★ここをFirebase Consoleの値に置き換える
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let selectedEmoji = null;
    let selectedQuad = null;

    const status = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");
    const doneBtn = document.getElementById("doneBtn");
    const sentBox = document.getElementById("sentBox");
    const sentMessage = document.getElementById("sentMessage");

    document.querySelectorAll(".emoji").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".emoji").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedEmoji = btn.dataset.emoji;
        status.textContent = "位置も選んで送信してください";
      });
    });

    document.querySelectorAll(".quad").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".quad").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedQuad = btn.dataset.quad;
        status.textContent = "絵文字と位置を確認して送信してください";
      });
    });

    sendBtn.addEventListener("click", async () => {
      if (!selectedEmoji || !selectedQuad) {
        status.textContent = "絵文字と位置を両方選んでください";
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = "送信中...";
      status.textContent = "送信中です";

      try {
        await push(ref(db, "reactions"), {
          emoji: selectedEmoji,
          quadrant: selectedQuad,
          createdAt: serverTimestamp()
        });

        status.textContent = "";
        sentMessage.textContent = `${selectedEmoji} を送信しました`;
        sentBox.style.display = "block";
        doneBtn.style.display = "inline-block";
        sendBtn.style.display = "none";

      } catch (e) {
        console.error(e);
        status.textContent = "送信エラー：Firebase設定またはRulesを確認してください";
        sendBtn.disabled = false;
        sendBtn.textContent = "送信";
      }
    });

    doneBtn.addEventListener("click", () => {
      selectedEmoji = null;
      selectedQuad = null;

      document.querySelectorAll(".emoji, .quad").forEach(b => b.classList.remove("selected"));

      sentBox.style.display = "none";
      doneBtn.style.display = "none";
      sendBtn.style.display = "inline-block";
      sendBtn.disabled = false;
      sendBtn.textContent = "送信";
      status.textContent = "絵文字と位置を選んでください";
    });
  </script>
</body>
</html>
