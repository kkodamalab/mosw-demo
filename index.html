<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOSW Reaction</title>
  <style>
    body { font-family: system-ui, sans-serif; text-align: center; padding: 20px; background:#111; color:white; }
    button { cursor:pointer; }
    .emoji {
      font-size: 34px; margin: 6px; padding: 12px 16px;
      border-radius: 14px; border: 2px solid #555; background:#222; color:white;
    }
    .selected { border-color:white; background:#555; }
    #stage {
      width: 90vw;
      max-width: 520px;
      aspect-ratio: 16 / 9;
      margin: 18px auto;
      border: 2px solid #aaa;
      position: relative;
      background: linear-gradient(135deg,#222,#333);
      touch-action: none;
    }
    .grid-v, .grid-h { position:absolute; background:rgba(255,255,255,.25); }
    .grid-v { top:0; bottom:0; width:1px; }
    .grid-h { left:0; right:0; height:1px; }
    #marker {
      position:absolute;
      transform: translate(-50%, -50%);
      font-size: 34px;
      display:none;
      pointer-events:none;
    }
    .send, .done {
      margin-top: 18px; font-size: 22px; padding: 14px 32px;
      border-radius: 12px; border:none; color:white;
    }
    .send { background:#ff4081; }
    .done { background:#00c853; display:none; }
    #status { margin-top:18px; color:#ccc; min-height:1.5em; }
    #sentBox {
      display:none; margin-top: 24px; padding: 18px;
      border: 2px solid #00c853; border-radius: 16px; background:#18251d;
    }
  </style>
</head>
<body>
  <h1>リアクション送信</h1>

  <h2>絵文字</h2>
  <button class="emoji" data-emoji="☺️">☺️</button>
  <button class="emoji" data-emoji="💗">💗</button>
  <button class="emoji" data-emoji="👍">👍</button>
  <button class="emoji" data-emoji="⭐">⭐</button>
  <button class="emoji" data-emoji="🙌">🙌</button>
  <button class="emoji" data-emoji="🍻">🍻</button>

  <h2>表示したい場所をタッチ</h2>
  <div id="stage">
    <div id="marker"></div>
  </div>

  <button class="send" id="sendBtn">送信</button>
  <div id="status">絵文字と表示位置を選んでください</div>

  <div id="sentBox">
    <h2 id="sentMessage">送信完了</h2>
    <button class="done" id="doneBtn">完了</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaqSeyjtG7Y0CbhAITOjjP5lvAAbk2-k",
      authDomain: "mosw-f855e.firebaseapp.com",
      databaseURL: "https://mosw-f855e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mosw-f855e",
      storageBucket: "mosw-f855e.firebasestorage.app",
      messagingSenderId: "1093592474312",
      appId: "1:1093592474312:web:76370050415013cf9bbbfd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let selectedEmoji = null;
    let selectedX = null;
    let selectedY = null;
    let selectedCol = null;
    let selectedRow = null;

    const stage = document.getElementById("stage");
    const marker = document.getElementById("marker");
    const status = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");
    const doneBtn = document.getElementById("doneBtn");
    const sentBox = document.getElementById("sentBox");
    const sentMessage = document.getElementById("sentMessage");

    // 5列×3行のガイド線
    for (let i = 1; i < 5; i++) {
      const v = document.createElement("div");
      v.className = "grid-v";
      v.style.left = `${i * 20}%`;
      stage.appendChild(v);
    }
    for (let i = 1; i < 3; i++) {
      const h = document.createElement("div");
      h.className = "grid-h";
      h.style.top = `${i * 33.333}%`;
      stage.appendChild(h);
    }

    document.querySelectorAll(".emoji").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".emoji").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedEmoji = btn.dataset.emoji;
        marker.textContent = selectedEmoji;
        if (selectedX !== null) marker.style.display = "block";
        status.textContent = "表示位置をタッチしてください";
      });
    });

    stage.addEventListener("pointerdown", e => {
      const rect = stage.getBoundingClientRect();
      const x = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      const y = Math.min(1, Math.max(0, (e.clientY - rect.top) / rect.height));

      selectedCol = Math.min(4, Math.floor(x * 5));
      selectedRow = Math.min(2, Math.floor(y * 3));

      selectedX = (selectedCol + 0.5) / 5;
      selectedY = (selectedRow + 0.5) / 3;

      marker.style.left = `${selectedX * 100}%`;
      marker.style.top = `${selectedY * 100}%`;
      marker.textContent = selectedEmoji || "📍";
      marker.style.display = "block";

      status.textContent = "絵文字と位置を確認して送信してください";
    });

    sendBtn.addEventListener("click", async () => {
      if (!selectedEmoji || selectedX === null || selectedY === null) {
        status.textContent = "絵文字と表示位置を選んでください";
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = "送信中...";
      status.textContent = "送信中です";

      try {
        await push(ref(db, "reactions"), {
          emoji: selectedEmoji,
          x: selectedX,
          y: selectedY,
          col: selectedCol,
          row: selectedRow,
          createdAt: serverTimestamp()
        });

        status.textContent = "";
        sentMessage.textContent = `${selectedEmoji} を送信しました`;
        sentBox.style.display = "block";
        doneBtn.style.display = "inline-block";
        sendBtn.style.display = "none";

      } catch (e) {
        status.textContent = `送信エラー：${e.message}`;
        sendBtn.disabled = false;
        sendBtn.textContent = "送信";
      }
    });

    doneBtn.addEventListener("click", () => {
      selectedEmoji = null;
      selectedX = null;
      selectedY = null;
      selectedCol = null;
      selectedRow = null;

      document.querySelectorAll(".emoji").forEach(b => b.classList.remove("selected"));
      marker.style.display = "none";
      sentBox.style.display = "none";
      doneBtn.style.display = "none";
      sendBtn.style.display = "inline-block";
      sendBtn.disabled = false;
      sendBtn.textContent = "送信";
      status.textContent = "絵文字と表示位置を選んでください";
    });
  </script>
</body>
</html>
