<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MOSW Reaction</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 12px;
      box-sizing: border-box;
    }

    #app {
      width: 100%;
      max-width: 640px;
    }

    #emojiPalette {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 22px;
    }

    .emojiBtn {
      height: 62px;
      border: 2px solid rgba(255,255,255,.25);
      border-radius: 14px;
      background: #222;
      color: #fff;
      font-size: 30px;
      cursor: pointer;
      transition: transform .08s ease, background .08s ease, border-color .08s ease;
    }

    .emojiBtn:active {
      transform: scale(.94);
    }

    .emojiBtn.selected {
      background: #555;
      border-color: #fff;
    }

    #positionArea {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 2px solid rgba(255,255,255,.75);
      background:
        linear-gradient(rgba(255,255,255,.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.16) 1px, transparent 1px),
        linear-gradient(135deg, #202020, #303030);
      background-size: 20% 33.333%, 20% 33.333%, auto;
      overflow: hidden;
      box-sizing: border-box;
      margin-bottom: 18px;
    }

    .placedEmoji {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 30px;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255,255,255,.65);
      animation: pop .12s ease-out;
    }

    @keyframes pop {
      from { transform: translate(-50%, -50%) scale(.5); opacity: .4; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    #status {
      min-height: 28px;
      text-align: center;
      font-size: 16px;
      color: #00e676;
      margin-bottom: 12px;
    }

    #sendBtn {
      width: 100%;
      height: 64px;
      border: none;
      border-radius: 16px;
      background: #00c853;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
    }

    #sendBtn:active {
      transform: scale(.98);
    }

    #sendBtn:disabled {
      background: #444;
      color: #aaa;
      cursor: default;
    }

    #clearBtn {
      width: 100%;
      height: 44px;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 12px;
      background: transparent;
      color: rgba(255,255,255,.75);
      font-size: 16px;
      cursor: pointer;
    }

    #counter {
      text-align: center;
      color: rgba(255,255,255,.72);
      font-size: 14px;
      margin: 8px 0 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="emojiPalette">
      <button class="emojiBtn selected" data-emoji="☺️">☺️</button>
      <button class="emojiBtn" data-emoji="💗">💗</button>
      <button class="emojiBtn" data-emoji="👍">👍</button>
      <button class="emojiBtn" data-emoji="⭐">⭐</button>
      <button class="emojiBtn" data-emoji="🙌">🙌</button>
      <button class="emojiBtn" data-emoji="🍻">🍻</button>
    </div>

    <div id="positionArea"></div>

    <div id="counter">0 / 15</div>
    <div id="status"></div>

    <button id="sendBtn" disabled>送信</button>
    <button id="clearBtn">クリア</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaqSeyjtG7Y0CbhAITOjjP5lvAAbk2-k",
      authDomain: "mosw-f855e.firebaseapp.com",
      databaseURL: "https://mosw-f855e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mosw-f855e",
      storageBucket: "mosw-f855e.firebasestorage.app",
      messagingSenderId: "1093592474312",
      appId: "1:1093592474312:web:76370050415013cf9bbbfd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const emojiButtons = document.querySelectorAll(".emojiBtn");
    const positionArea = document.getElementById("positionArea");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const counter = document.getElementById("counter");
    const status = document.getElementById("status");

    const MAX_REACTIONS = 15;
    let selectedEmoji = "☺️";
    let reactions = [];

    emojiButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        emojiButtons.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedEmoji = btn.dataset.emoji;
      });
    });

    positionArea.addEventListener("pointerdown", e => {
      if (reactions.length >= MAX_REACTIONS) {
        status.textContent = "最大15個まで選択できます";
        return;
      }

      const rect = positionArea.getBoundingClientRect();
      const rawX = (e.clientX - rect.left) / rect.width;
      const rawY = (e.clientY - rect.top) / rect.height;

      const col = Math.floor(rawX * 5);
      const row = Math.floor(rawY * 3);

      const x = (col + 0.5) / 5;
      const y = (row + 0.5) / 3;

      const reaction = {
        emoji: selectedEmoji,
        x,
        y
      };

      reactions.push(reaction);
      drawPlacedEmoji(reaction);
      updateUI();
    });

    function drawPlacedEmoji(reaction) {
      const el = document.createElement("div");
      el.className = "placedEmoji";
      el.textContent = reaction.emoji;
      el.style.left = `${reaction.x * 100}%`;
      el.style.top = `${reaction.y * 100}%`;
      positionArea.appendChild(el);
    }

    function updateUI() {
      counter.textContent = `${reactions.length} / ${MAX_REACTIONS}`;
      sendBtn.disabled = reactions.length === 0;
    }

    function clearReactions() {
      reactions = [];
      positionArea.querySelectorAll(".placedEmoji").forEach(el => el.remove());
      status.textContent = "";
      updateUI();
    }

    clearBtn.addEventListener("click", clearReactions);

    sendBtn.addEventListener("click", async () => {
      if (reactions.length === 0) return;

      sendBtn.disabled = true;
      status.textContent = "送信中...";

      try {
        const reactionsRef = ref(db, "reactions");

        for (const reaction of reactions) {
          await push(reactionsRef, {
            emoji: reaction.emoji,
            x: reaction.x,
            y: reaction.y,
            timestamp: serverTimestamp()
          });
        }

        const sentCount = reactions.length;
        clearReactions();
        status.textContent = `${sentCount}個送信しました`;

        setTimeout(() => {
          status.textContent = "";
        }, 1200);

      } catch (e) {
        status.textContent = "送信エラー: " + e.message;
        updateUI();
      }
    });

    updateUI();
  </script>
</body>
</html>
