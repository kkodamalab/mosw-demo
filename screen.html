<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>MOSW VJ Screen</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    #screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #vjCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #000;
    }

    video {
      display: none;
    }

    #message {
      position: absolute;
      top: 34px;
      left: 42px;
      z-index: 4;
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      pointer-events: none;
    }

    #hint {
      position: absolute;
      top: 74px;
      left: 42px;
      z-index: 4;
      color: #fff;
      font-size: 17px;
      pointer-events: none;
    }

    #controls {
      position: fixed;
      left: 18px;
      bottom: 14px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(0,0,0,0.35);
      color: white;
      font-size: 12px;
      user-select: none;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button, select, input {
      font-size: 13px;
    }

    button {
      border: 0;
      border-radius: 9px;
      padding: 9px 13px;
      background: #ddd;
      color: #111;
      cursor: pointer;
    }

    button.active {
      background: #00d084;
      color: #000;
      font-weight: 700;
    }

    select {
      height: 34px;
      border-radius: 8px;
      padding: 4px;
    }

    input[type="range"] {
      width: 120px;
    }

    .mini-label {
      opacity: 0.9;
      font-size: 12px;
    }

    .emoji {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      animation: fly 2.8s ease-out forwards;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
    }

    @keyframes fly {
      0% {
        transform: translateY(0) scale(0.5) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(-65vh) scale(1.9) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="screen">
    <canvas id="vjCanvas"></canvas>
    <video id="cameraA" autoplay playsinline muted></video>
    <video id="cameraB" autoplay playsinline muted></video>

    <div id="message">カメラ開始を押してください</div>
    <div id="hint">1 RGB / 2 Glitch / 3 Mirror / 4 Wave / 5 Mono / 6 Invert / 7 Pixel / 8 Strobe / 9 Zoom / 0 Clear / S Sync / F Fullscreen</div>

    <div id="controls">
      <div class="control-row">
        <button id="startBtn">カメラ開始</button>
        <button class="camBtn active" data-mode="A">A</button>
        <button class="camBtn" data-mode="B">B</button>
        <button class="camBtn" data-mode="split">Split</button>
        <button class="camBtn" data-mode="overlay">Overlay</button>
        <button class="camBtn" data-mode="pip">PiP</button>
        <span class="mini-label">Cam A</span><select id="camSelectA"></select>
        <span class="mini-label">Cam B</span><select id="camSelectB"></select>
        <span class="mini-label">Split</span><input id="splitSlider" type="range" min="10" max="90" value="50">
        <span id="splitLabel">5:5</span>
      </div>

      <div class="control-row">
        <button id="syncBtn">SYNC OFF</button>
        <button id="clearFxBtn" class="active">0 Clear</button>
        <button class="fxBtn" data-fx="rgb">1 RGB</button>
        <button class="fxBtn" data-fx="glitch">2 Glitch</button>
        <button class="fxBtn" data-fx="mirror">3 Mirror</button>
        <button class="fxBtn" data-fx="wave">4 Wave</button>
        <button class="fxBtn" data-fx="mono">5 Mono</button>
        <button class="fxBtn" data-fx="invert">6 Invert</button>
        <button class="fxBtn" data-fx="pixel">7 Pixel</button>
        <button class="fxBtn" data-fx="strobe">8 Strobe</button>
        <button class="fxBtn" data-fx="zoom">9 Zoom</button>
        <span class="mini-label">Power</span><input id="powerSlider" type="range" min="0" max="100" value="55">
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD4rBlSp7clQ6Gh_vfSjqiDL-l6fdJsdIM",
      authDomain: "mosw-f855e.firebaseapp.com",
      databaseURL: "https://mosw-f855e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mosw-f855e",
      storageBucket: "mosw-f855e.appspot.com",
      messagingSenderId: "509800323386",
      appId: "1:509800323386:web:4c43a1e9b7a8e9b0f6b3b4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById("vjCanvas");
    const ctx = canvas.getContext("2d", { alpha: false });

    const videoA = document.getElementById("cameraA");
    const videoB = document.getElementById("cameraB");

    const startBtn = document.getElementById("startBtn");
    const syncBtn = document.getElementById("syncBtn");
    const clearFxBtn = document.getElementById("clearFxBtn");
    const camSelectA = document.getElementById("camSelectA");
    const camSelectB = document.getElementById("camSelectB");
    const splitSlider = document.getElementById("splitSlider");
    const splitLabel = document.getElementById("splitLabel");
    const powerSlider = document.getElementById("powerSlider");
    const message = document.getElementById("message");

    let streamA = null;
    let streamB = null;
    let camMode = "A";
    let activeFx = new Set();
    let split = 0.5;
    let power = 0.55;
    let sync = false;
    let t = 0;
    let frame = 0;

    const fxBuffer = document.createElement("canvas");
    const fxCtx = fxBuffer.getContext("2d");

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    async function listCameras() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === "videoinput");

      camSelectA.innerHTML = "";
      camSelectB.innerHTML = "";

      cams.forEach((cam, i) => {
        const label = cam.label || `Camera ${i + 1}`;

        const a = document.createElement("option");
        a.value = cam.deviceId;
        a.textContent = label;
        camSelectA.appendChild(a);

        const b = document.createElement("option");
        b.value = cam.deviceId;
        b.textContent = label;
        camSelectB.appendChild(b);
      });

      if (cams[1]) camSelectB.selectedIndex = 1;
    }

    async function startCamera(video, oldStream, deviceId) {
      if (oldStream) oldStream.getTracks().forEach(t => t.stop());

      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          deviceId: deviceId ? { exact: deviceId } : undefined,
          width: { ideal: 640 },
          height: { ideal: 480 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();
      return stream;
    }

    async function startAllCameras() {
      await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      await listCameras();

      streamA = await startCamera(videoA, streamA, camSelectA.value);
      streamB = await startCamera(videoB, streamB, camSelectB.value);

      startBtn.textContent = "カメラON";
      message.style.display = "none";
    }

    startBtn.onclick = async () => {
      try {
        await startAllCameras();
      } catch (e) {
        alert("カメラ起動に失敗しました: " + e.message);
      }
    };

    camSelectA.onchange = async () => {
      streamA = await startCamera(videoA, streamA, camSelectA.value);
    };

    camSelectB.onchange = async () => {
      streamB = await startCamera(videoB, streamB, camSelectB.value);
    };

    document.querySelectorAll(".camBtn").forEach(btn => {
      btn.onclick = () => {
        camMode = btn.dataset.mode;
        document.querySelectorAll(".camBtn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      };
    });

    function updateFxButtons() {
      document.querySelectorAll(".fxBtn").forEach(btn => {
        btn.classList.toggle("active", activeFx.has(btn.dataset.fx));
      });

      clearFxBtn.classList.toggle("active", activeFx.size === 0);
    }

    function toggleFx(nextFx) {
      if (activeFx.has(nextFx)) activeFx.delete(nextFx);
      else activeFx.add(nextFx);
      updateFxButtons();
    }

    function clearFx() {
      activeFx.clear();
      updateFxButtons();
    }

    document.querySelectorAll(".fxBtn").forEach(btn => {
      btn.onclick = () => toggleFx(btn.dataset.fx);
    });

    clearFxBtn.onclick = clearFx;

    syncBtn.onclick = () => {
      sync = !sync;
      syncBtn.textContent = sync ? "SYNC ON" : "SYNC OFF";
      syncBtn.classList.toggle("active", sync);
    };

    splitSlider.oninput = () => {
      split = Number(splitSlider.value) / 100;
      const n = Math.round(split * 10);
      splitLabel.textContent = `${n}:${10 - n}`;
    };

    powerSlider.oninput = () => {
      power = Number(powerSlider.value) / 100;
    };

    window.addEventListener("keydown", e => {
      if (e.key === "0") clearFx();
      if (e.key === "1") toggleFx("rgb");
      if (e.key === "2") toggleFx("glitch");
      if (e.key === "3") toggleFx("mirror");
      if (e.key === "4") toggleFx("wave");
      if (e.key === "5") toggleFx("mono");
      if (e.key === "6") toggleFx("invert");
      if (e.key === "7") toggleFx("pixel");
      if (e.key === "8") toggleFx("strobe");
      if (e.key === "9") toggleFx("zoom");
      if (e.key.toLowerCase() === "s") syncBtn.click();
      if (e.key.toLowerCase() === "f") document.documentElement.requestFullscreen();
    });

    function drawVideoCover(video, x, y, w, h) {
      if (!video.videoWidth || !video.videoHeight) return;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const scale = Math.max(w / vw, h / vh);
      const sw = w / scale;
      const sh = h / scale;
      const sx = (vw - sw) / 2;
      const sy = (vh - sh) / 2;

      ctx.drawImage(video, sx, sy, sw, sh, x, y, w, h);
    }

    function drawBase(w, h) {
      ctx.fillStyle = sync ? "rgba(0,0,0,0.18)" : "#000";
      ctx.fillRect(0, 0, w, h);

      if (camMode === "A") drawVideoCover(videoA, 0, 0, w, h);
      if (camMode === "B") drawVideoCover(videoB, 0, 0, w, h);

      if (camMode === "split") {
        const leftW = w * split;
        drawVideoCover(videoA, 0, 0, leftW, h);
        drawVideoCover(videoB, leftW, 0, w - leftW, h);
        ctx.fillStyle = "rgba(255,255,255,0.65)";
        ctx.fillRect(leftW - 1, 0, 2, h);
      }

      if (camMode === "overlay") {
        drawVideoCover(videoA, 0, 0, w, h);
        ctx.globalAlpha = 0.25 + power * 0.6;
        drawVideoCover(videoB, 0, 0, w, h);
        ctx.globalAlpha = 1;
      }

      if (camMode === "pip") {
        drawVideoCover(videoA, 0, 0, w, h);
        const pw = w * 0.3;
        const ph = pw * 9 / 16;
        const m = 28;
        drawVideoCover(videoB, w - pw - m, h - ph - m, pw, ph);
        ctx.strokeStyle = "rgba(255,255,255,0.85)";
        ctx.lineWidth = 3;
        ctx.strokeRect(w - pw - m, h - ph - m, pw, ph);
      }
    }

    function applyFx(w, h) {
      if (activeFx.size === 0) return;

      if (activeFx.has("rgb")) {
        const shift = 5 + power * 35;
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = 0.45;
        ctx.drawImage(canvas, shift, 0, w, h);
        ctx.drawImage(canvas, -shift, 0, w, h);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = "source-over";
      }

      if (activeFx.has("mirror")) {
        ctx.save();
        ctx.globalAlpha = 0.35 + power * 0.5;
        ctx.translate(w, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(canvas, 0, 0, w, h);
        ctx.restore();
      }

      if (activeFx.has("wave")) {
        fxBuffer.width = w;
        fxBuffer.height = h;
        fxCtx.drawImage(canvas, 0, 0, w, h);

        const amp = 4 + power * 28;
        const freq = 0.012 + power * 0.018;
        const slice = 6;

        for (let y = 0; y < h; y += slice) {
          const dx = Math.sin(y * freq + t) * amp;
          ctx.drawImage(fxBuffer, 0, y, w, slice, dx, y, w, slice);
        }
      }

      if (activeFx.has("glitch")) {
        const glitchInterval = Math.max(4, Math.floor(14 - power * 8));

        if (frame % glitchInterval === 0) {
          const count = 3 + Math.floor(power * 14);

          for (let i = 0; i < count; i++) {
            const y = Math.random() * h;
            const sh = 5 + Math.random() * 28;
            const dx = (Math.random() - 0.5) * power * 90;
            ctx.drawImage(canvas, 0, y, w, sh, dx, y, w, sh);
          }
        }
      }

      if (activeFx.has("mono") || activeFx.has("invert")) {
        const img = ctx.getImageData(0, 0, w, h);
        const d = img.data;

        for (let i = 0; i < d.length; i += 4) {
          const r = d[i];
          const g = d[i + 1];
          const b = d[i + 2];

          if (activeFx.has("mono")) {
            const gray = (r + g + b) / 3;
            d[i] = r * (1 - power) + gray * power;
            d[i + 1] = g * (1 - power) + gray * power;
            d[i + 2] = b * (1 - power) + gray * power;
          }

          if (activeFx.has("invert")) {
            d[i] = d[i] * (1 - power) + (255 - d[i]) * power;
            d[i + 1] = d[i + 1] * (1 - power) + (255 - d[i + 1]) * power;
            d[i + 2] = d[i + 2] * (1 - power) + (255 - d[i + 2]) * power;
          }
        }

        ctx.putImageData(img, 0, 0);
      }

      if (activeFx.has("pixel")) {
        const scale = 0.04 + (1 - power) * 0.18;
        const sw = Math.max(24, Math.floor(w * scale));
        const sh = Math.max(18, Math.floor(h * scale));

        fxBuffer.width = sw;
        fxBuffer.height = sh;
        fxCtx.imageSmoothingEnabled = false;
        fxCtx.drawImage(canvas, 0, 0, sw, sh);

        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(fxBuffer, 0, 0, sw, sh, 0, 0, w, h);
        ctx.imageSmoothingEnabled = true;
      }

      if (activeFx.has("strobe")) {
        const speed = 0.08 + power * 0.22;
        const flash = Math.sin(t * speed * 20) > 0.72;

        if (flash) {
          ctx.fillStyle = `rgba(255,255,255,${0.18 + power * 0.45})`;
          ctx.fillRect(0, 0, w, h);
        }
      }

      if (activeFx.has("zoom")) {
        const z = 1 + power * 0.08 + Math.sin(t * 1.5) * power * 0.025;
        const nw = w * z;
        const nh = h * z;
        const x = (w - nw) / 2;
        const y = (h - nh) / 2;

        fxBuffer.width = w;
        fxBuffer.height = h;
        fxCtx.drawImage(canvas, 0, 0, w, h);

        ctx.globalAlpha = 0.45 + power * 0.35;
        ctx.drawImage(fxBuffer, x, y, nw, nh);
        ctx.globalAlpha = 1;
      }
    }

    function loop() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      t += 0.05;
      frame++;

      drawBase(w, h);
      applyFx(w, h);

      requestAnimationFrame(loop);
    }

    function spawnEmoji(char) {
      const el = document.createElement("div");
      el.className = "emoji";
      el.textContent = char;
      el.style.fontSize = 36 + Math.random() * 70 + "px";
      el.style.left = Math.random() * 92 + "vw";
      el.style.bottom = "-10vh";
      document.getElementById("screen").appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function normalizeEmojiPayload(data) {
      if (!data) return [];
      if (Array.isArray(data.emojis)) return data.emojis;
      if (typeof data.emoji === "string") return [data.emoji];
      if (typeof data === "string") return [data];
      return [];
    }

    onChildAdded(ref(db, "reactions"), snapshot => {
      const emojis = normalizeEmojiPayload(snapshot.val());
      emojis.slice(0, 15).forEach((e, i) => {
        setTimeout(() => spawnEmoji(e), i * 70);
      });
    });

    updateFxButtons();
    loop();
  </script>
</body>
</html>
