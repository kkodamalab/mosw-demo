<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>MOSW Screen</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:system-ui,sans-serif; }
    #screen { position:relative; width:100vw; height:100vh; overflow:hidden; background:linear-gradient(135deg,#111,#222); }
    #cameraVideo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; z-index:0; transform:scaleX(-1); }
    #darkBackground { position:absolute; inset:0; background:linear-gradient(135deg,#111,#222); z-index:1; }

    .emoji {
      position:absolute;
      font-size:80px;
      pointer-events:none;
      animation:floatUp 3s ease-out forwards;
      text-shadow:0 0 20px rgba(255,255,255,.7);
      z-index:10;
      transform:translate(-50%, -50%);
    }

    #toggleCameraBtn {
      position:fixed;
      right:18px;
      top:18px;
      z-index:9999;
      padding:10px 16px;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,.88);
      color:#111;
      font-size:15px;
      cursor:pointer;
    }

    #debug {
      position:fixed;
      left:10px;
      top:10px;
      z-index:9999;
      color:#0f0;
      background:rgba(0,0,0,.75);
      font:14px monospace;
      padding:8px;
      white-space:pre-wrap;
      max-width:55vw;
      display:none;
    }

    body.event-mode #toggleCameraBtn,
    body.event-mode #debug {
      display:none;
    }

    body.debug-mode #debug {
      display:block;
    }

    @keyframes floatUp {
      0% {
        opacity:0;
        transform:translate(-50%, -50%) translateY(40px) scale(.7) rotate(-8deg);
      }
      20% {
        opacity:1;
      }
      55% {
        transform:translate(-50%, -50%) translateY(-40px) scale(1.15) rotate(8deg);
      }
      100% {
        opacity:0;
        transform:translate(-50%, -50%) translateY(-160px) scale(1.6) rotate(-4deg);
      }
    }
  </style>
</head>
<body>
  <div id="screen">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <div id="darkBackground"></div>
  </div>

  <button id="toggleCameraBtn">背景切替：カメラOFF</button>
  <div id="debug">起動中...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onChildAdded, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaqSeyjtG7Y0CbhAITOjjP5lvAAbk2-k",
      authDomain: "mosw-f855e.firebaseapp.com",
      databaseURL: "https://mosw-f855e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mosw-f855e",
      storageBucket: "mosw-f855e.firebasestorage.app",
      messagingSenderId: "1093592474312",
      appId: "1:1093592474312:web:76370050415013cf9bbbfd"
    };

    const params = new URLSearchParams(window.location.search);

    const isEventMode = params.get("mode") === "event";
    const isDebugMode = params.get("debug") === "1";

    if (isEventMode) {
      document.body.classList.add("event-mode");
    }

    if (isDebugMode) {
      document.body.classList.add("debug-mode");
    }

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const screen = document.getElementById("screen");
    const debug = document.getElementById("debug");
    const cameraVideo = document.getElementById("cameraVideo");
    const darkBackground = document.getElementById("darkBackground");
    const toggleCameraBtn = document.getElementById("toggleCameraBtn");

    let cameraOn = false;
    let cameraStream = null;

    function log(msg) {
      console.log(msg);
      debug.textContent = msg;
    }

    async function startCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: "environment"
          },
          audio: false
        });

        cameraVideo.srcObject = cameraStream;
        cameraVideo.style.display = "block";
        darkBackground.style.display = "none";
        cameraOn = true;
        toggleCameraBtn.textContent = "背景切替：カメラON";
        log("カメラ背景ON。リアクション待機中...");
      } catch (e) {
        log("カメラ起動エラー: " + e.message);
      }
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }

      cameraVideo.srcObject = null;
      cameraVideo.style.display = "none";
      darkBackground.style.display = "block";
      cameraOn = false;
      toggleCameraBtn.textContent = "背景切替：カメラOFF";
      log("黒背景ON。リアクション待機中...");
    }

    toggleCameraBtn.addEventListener("click", async () => {
      if (cameraOn) {
        stopCamera();
      } else {
        await startCamera();
      }
    });

    function showEmoji(emoji, x, y) {
      const el = document.createElement("div");
      el.className = "emoji";
      el.textContent = emoji;

      const safeX = Math.min(Math.max(x, 0), 1);
      const safeY = Math.min(Math.max(y, 0), 1);

      el.style.left = `${safeX * window.innerWidth}px`;
      el.style.top = `${safeY * window.innerHeight}px`;

      const size = 64 + Math.random() * 40;
      el.style.fontSize = `${size}px`;

      screen.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 3000);
    }

    try {
      const reactionsRef = ref(db, "reactions");

      const snapshot = await get(reactionsRef);
      log(snapshot.exists() ? "既存データあり。新規送信を待機中..." : "reactionsは空。スマホから送信してください。");

      onChildAdded(reactionsRef, snapshot => {
        const data = snapshot.val();

        if (!data || !data.emoji) return;

        log("受信: " + JSON.stringify(data));

        if (typeof data.x === "number" && typeof data.y === "number") {
          showEmoji(data.emoji, data.x, data.y);
        }
      });

    } catch (e) {
      log("Firebase読取エラー: " + e.message);
    }
  </script>
</body>
</html>
