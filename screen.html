<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>MOSW VJ Screen</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    #screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #vjCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #000;
    }

    #cameraVideo {
      display: none;
    }

    .emoji {
      position: absolute;
      pointer-events: none;
      animation: floatUp 3s ease-out forwards;
      text-shadow: 0 0 22px rgba(255,255,255,.9), 0 0 44px rgba(255,255,255,.5);
      z-index: 10;
      transform: translate(-50%, -50%);
    }

    #controls {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 90vw;
    }

    button {
      padding: 9px 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,.85);
      color: #111;
      font-size: 14px;
      cursor: pointer;
    }

    button.active {
      background: #00e5ff;
      color: #000;
      font-weight: 700;
    }

    body.event-mode #controls,
    body.event-mode #debug {
      display: none;
    }

    #debug {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 9999;
      color: #0f0;
      background: rgba(0,0,0,.75);
      font: 13px monospace;
      padding: 8px;
      white-space: pre-wrap;
      display: none;
    }

    body.debug-mode #debug {
      display: block;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(40px) scale(.7) rotate(-10deg);
      }
      18% {
        opacity: 1;
      }
      55% {
        transform: translate(-50%, -50%) translateY(-35px) scale(1.2) rotate(10deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(-180px) scale(1.8) rotate(-6deg);
      }
    }
  </style>
</head>

<body>
  <div id="screen">
    <canvas id="vjCanvas"></canvas>
    <video id="cameraVideo" autoplay playsinline muted></video>
  </div>

  <div id="controls">
    <button id="startCameraBtn">カメラ開始</button>
    <button data-effect="normal" class="active">1 Normal</button>
    <button data-effect="rgb">2 RGB</button>
    <button data-effect="glitch">3 Glitch</button>
    <button data-effect="mirror">4 Mirror</button>
    <button data-effect="wave">5 Wave</button>
  </div>

  <div id="debug">起動中...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onChildAdded, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaqSeyjtG7Y0CbhAITOjjP5lvAAbk2-k",
      authDomain: "mosw-f855e.firebaseapp.com",
      databaseURL: "https://mosw-f855e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mosw-f855e",
      storageBucket: "mosw-f855e.firebasestorage.app",
      messagingSenderId: "1093592474312",
      appId: "1:1093592474312:web:76370050415013cf9bbbfd"
    };

    const params = new URLSearchParams(window.location.search);
    const isEventMode = params.get("mode") === "event";
    const isDebugMode = params.get("debug") === "1";

    if (isEventMode) document.body.classList.add("event-mode");
    if (isDebugMode) document.body.classList.add("debug-mode");

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const screen = document.getElementById("screen");
    const canvas = document.getElementById("vjCanvas");
    const ctx = canvas.getContext("2d");
    const video = document.getElementById("cameraVideo");
    const debug = document.getElementById("debug");
    const startCameraBtn = document.getElementById("startCameraBtn");
    const effectButtons = document.querySelectorAll("[data-effect]");

    const workCanvas = document.createElement("canvas");
    const workCtx = workCanvas.getContext("2d");

    let currentEffect = "normal";
    let cameraStream = null;
    let t = 0;

    function log(msg) {
      console.log(msg);
      debug.textContent = msg;
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      workCanvas.width = 640;
      workCanvas.height = 360;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    async function startCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: "environment"
          },
          audio: false
        });

        video.srcObject = cameraStream;
        await video.play();
        startCameraBtn.textContent = "カメラON";
        log("カメラON。1〜5キーでエフェクト切替。");
      } catch (e) {
        log("カメラ起動エラー: " + e.message);
      }
    }

    startCameraBtn.addEventListener("click", startCamera);

    function setEffect(effect) {
      currentEffect = effect;

      effectButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.effect === effect);
      });

      log("Effect: " + effect);
    }

    effectButtons.forEach(btn => {
      btn.addEventListener("click", () => setEffect(btn.dataset.effect));
    });

    window.addEventListener("keydown", e => {
      if (e.key === "1") setEffect("normal");
      if (e.key === "2") setEffect("rgb");
      if (e.key === "3") setEffect("glitch");
      if (e.key === "4") setEffect("mirror");
      if (e.key === "5") setEffect("wave");
      if (e.key.toLowerCase() === "f") document.documentElement.requestFullscreen?.();
    });

    function drawCover(source, targetCtx, w, h, mirror = false) {
      const vw = source.videoWidth || 1280;
      const vh = source.videoHeight || 720;
      const scale = Math.max(w / vw, h / vh);
      const sw = vw * scale;
      const sh = vh * scale;
      const x = (w - sw) / 2;
      const y = (h - sh) / 2;

      targetCtx.save();
      if (mirror) {
        targetCtx.translate(w, 0);
        targetCtx.scale(-1, 1);
        targetCtx.drawImage(source, x, y, sw, sh);
      } else {
        targetCtx.drawImage(source, x, y, sw, sh);
      }
      targetCtx.restore();
    }

    function renderNormal() {
      ctx.drawImage(workCanvas, 0, 0, canvas.width, canvas.height);
    }

    function renderMirror() {
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(workCanvas, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      ctx.globalAlpha = 0.35;
      ctx.drawImage(workCanvas, 0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;
    }

    function renderRgb() {
      const shift = 10 + Math.sin(t * 0.08) * 8;

      ctx.globalCompositeOperation = "source-over";
      ctx.filter = "none";
      ctx.globalAlpha = 1;
      ctx.drawImage(workCanvas, 0, 0, canvas.width, canvas.height);

      ctx.globalCompositeOperation = "screen";

      ctx.globalAlpha = 0.55;
      ctx.filter = "sepia(1) saturate(8) hue-rotate(-40deg)";
      ctx.drawImage(workCanvas, shift, 0, canvas.width, canvas.height);

      ctx.filter = "sepia(1) saturate(8) hue-rotate(90deg)";
      ctx.drawImage(workCanvas, -shift, 0, canvas.width, canvas.height);

      ctx.filter = "sepia(1) saturate(8) hue-rotate(190deg)";
      ctx.drawImage(workCanvas, 0, shift * 0.5, canvas.width, canvas.height);

      ctx.globalAlpha = 1;
      ctx.filter = "none";
      ctx.globalCompositeOperation = "source-over";
    }

    function renderGlitch() {
      ctx.drawImage(workCanvas, 0, 0, canvas.width, canvas.height);

      const strips = 18;
      for (let i = 0; i < strips; i++) {
        if (Math.random() > 0.45) continue;

        const y = Math.random() * canvas.height;
        const h = 8 + Math.random() * 45;
        const xOffset = (Math.random() - 0.5) * 90;

        ctx.drawImage(
          canvas,
          0, y, canvas.width, h,
          xOffset, y, canvas.width, h
        );
      }

      if (Math.random() > 0.75) {
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = "white";
        ctx.fillRect(0, Math.random() * canvas.height, canvas.width, 4);
        ctx.globalAlpha = 1;
      }
    }

    function renderWave() {
      const sliceH = 6;
      for (let y = 0; y < canvas.height; y += sliceH) {
        const offset = Math.sin(y * 0.025 + t * 0.08) * 28;
        ctx.drawImage(
          workCanvas,
          0, y / canvas.height * workCanvas.height,
          workCanvas.width,
          sliceH / canvas.height * workCanvas.height,
          offset,
          y,
          canvas.width,
          sliceH
        );
      }
    }

    function drawLoop() {
      t++;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (video.readyState >= 2) {
        workCtx.clearRect(0, 0, workCanvas.width, workCanvas.height);
        drawCover(video, workCtx, workCanvas.width, workCanvas.height, true);

        if (currentEffect === "normal") renderNormal();
        if (currentEffect === "rgb") renderRgb();
        if (currentEffect === "glitch") renderGlitch();
        if (currentEffect === "mirror") renderMirror();
        if (currentEffect === "wave") renderWave();
      } else {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "28px system-ui";
        ctx.fillText("カメラ開始を押してください", 40, 60);
      }

      requestAnimationFrame(drawLoop);
    }

    drawLoop();

    function showEmoji(emoji, x, y) {
      const el = document.createElement("div");
      el.className = "emoji";
      el.textContent = emoji;

      const safeX = Math.min(Math.max(x, 0), 1);
      const safeY = Math.min(Math.max(y, 0), 1);

      el.style.left = `${safeX * window.innerWidth}px`;
      el.style.top = `${safeY * window.innerHeight}px`;

      const size = 72 + Math.random() * 54;
      el.style.fontSize = `${size}px`;

      screen.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 3000);
    }

    try {
      const reactionsRef = ref(db, "reactions");

      const snapshot = await get(reactionsRef);
      log(snapshot.exists() ? "既存データあり。新規送信を待機中..." : "reactionsは空。スマホから送信してください。");

      onChildAdded(reactionsRef, snapshot => {
        const data = snapshot.val();

        if (!data || !data.emoji) return;

        log("受信: " + JSON.stringify(data));

        if (typeof data.x === "number" && typeof data.y === "number") {
          showEmoji(data.emoji, data.x, data.y);
        } else {
          showEmoji(data.emoji, Math.random(), Math.random());
        }
      });

    } catch (e) {
      log("Firebase読取エラー: " + e.message);
    }
  </script>
</body>
</html>
