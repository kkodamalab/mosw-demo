<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>MOSW VJ Screen</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    #screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #vjCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #000;
    }

    #cameraVideo {
      display: none;
    }

    .emoji {
      position: absolute;
      pointer-events: none;
      animation: floatUp 3s ease-out forwards;
      text-shadow: 0 0 22px rgba(255,255,255,.9), 0 0 44px rgba(255,255,255,.5);
      z-index: 10;
      transform: translate(-50%, -50%);
    }

    #controls {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 90vw;
    }

    button {
      padding: 9px 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,.85);
      color: #111;
      font-size: 14px;
      cursor: pointer;
    }

    button.active {
      background: #00e5ff;
      color: #000;
      font-weight: 700;
    }

    #syncBtn.active {
      background: #ff2bd6;
      color: #fff;
      font-weight: 800;
    }

    body.event-mode #controls,
    body.event-mode #debug {
      display: none;
    }

    #debug {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 9999;
      color: #0f0;
      background: rgba(0,0,0,.75);
      font: 13px monospace;
      padding: 8px;
      white-space: pre-wrap;
      display: none;
    }

    body.debug-mode #debug {
      display: block;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(40px) scale(.7) rotate(-10deg);
      }
      18% {
        opacity: 1;
      }
      55% {
        transform: translate(-50%, -50%) translateY(-35px) scale(1.2) rotate(10deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(-180px) scale(1.8) rotate(-6deg);
      }
    }
  </style>
</head>

<body>
  <div id="screen">
    <canvas id="vjCanvas"></canvas>
    <video id="cameraVideo" autoplay playsinline muted></video>
  </div>

  <div id="controls">
    <button id="startCameraBtn">カメラ開始</button>
    <button id="syncBtn">SYNC OFF</button>
    <button id="clearEffectsBtn">0 Clear</button>
    <button data-effect="rgb">1 RGB</button>
    <button data-effect="glitch">2 Glitch</button>
    <button data-effect="mirror">3 Mirror</button>
    <button data-effect="wave">4 Wave</button>
  </div>

  <div id="debug">起動中...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onChildAdded, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAaqSeyjtG7Y0CbhAITOjjP5lvAAbk2-k",
      authDomain: "mosw-f855e.firebaseapp.com",
      databaseURL: "https://mosw-f855e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mosw-f855e",
      storageBucket: "mosw-f855e.firebasestorage.app",
      messagingSenderId: "1093592474312",
      appId: "1:1093592474312:web:76370050415013cf9bbbfd"
    };

    const params = new URLSearchParams(window.location.search);
    const isEventMode = params.get("mode") === "event";
    const isDebugMode = params.get("debug") === "1";

    if (isEventMode) document.body.classList.add("event-mode");
    if (isDebugMode) document.body.classList.add("debug-mode");

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const screen = document.getElementById("screen");
    const canvas = document.getElementById("vjCanvas");
    const ctx = canvas.getContext("2d");
    const video = document.getElementById("cameraVideo");
    const debug = document.getElementById("debug");
    const startCameraBtn = document.getElementById("startCameraBtn");
    const syncBtn = document.getElementById("syncBtn");
    const clearEffectsBtn = document.getElementById("clearEffectsBtn");
    const effectButtons = document.querySelectorAll("[data-effect]");

    const baseCanvas = document.createElement("canvas");
    const baseCtx = baseCanvas.getContext("2d");

    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");

    let activeEffects = new Set();
    let cameraStream = null;
    let t = 0;

    let syncOn = false;
    let audioCtx = null;
    let analyser = null;
    let audioData = null;
    let micStream = null;

    let bassEnergy = 0;
    let bassAvg = 0;
    let beatPulse = 0;
    let lastBeatTime = 0;
    let estimatedBpm = 0;
    let beatIntervals = [];

    function log(msg) {
      console.log(msg);
      debug.textContent = msg;
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      baseCanvas.width = 640;
      baseCanvas.height = 360;
      tempCanvas.width = 640;
      tempCanvas.height = 360;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    async function startCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: "environment"
          },
          audio: false
        });

        video.srcObject = cameraStream;
        await video.play();
        startCameraBtn.textContent = "カメラON";
        log("カメラON。0〜4キーでエフェクトON/OFF。SでSYNC。");
      } catch (e) {
        log("カメラ起動エラー: " + e.message);
      }
    }

    startCameraBtn.addEventListener("click", startCamera);

    async function startSync() {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
          },
          video: false
        });

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(micStream);

        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.75;

        audioData = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);

        syncOn = true;
        syncBtn.classList.add("active");
        syncBtn.textContent = "SYNC ON";

        log("SYNC ON。Glitch/WaveがONの時、低音ピークに同期します。");
      } catch (e) {
        log("SYNC起動エラー: " + e.message);
      }
    }

    function stopSync() {
      syncOn = false;

      if (micStream) {
        micStream.getTracks().forEach(track => track.stop());
        micStream = null;
      }

      if (audioCtx) {
        audioCtx.close();
        audioCtx = null;
      }

      analyser = null;
      audioData = null;
      beatPulse = 0;
      bassEnergy = 0;
      bassAvg = 0;
      beatIntervals = [];
      estimatedBpm = 0;

      syncBtn.classList.remove("active");
      syncBtn.textContent = "SYNC OFF";

      log("SYNC OFF");
    }

    syncBtn.addEventListener("click", async () => {
      if (syncOn) {
        stopSync();
      } else {
        await startSync();
      }
    });

    function updateAudioSync() {
      if (!syncOn || !analyser || !audioData || !audioCtx) {
        beatPulse *= 0.9;
        return;
      }

      analyser.getByteFrequencyData(audioData);

      const sampleRate = audioCtx.sampleRate;
      const binHz = sampleRate / analyser.fftSize;

      const lowMin = 50;
      const lowMax = 180;

      let sum = 0;
      let count = 0;

      for (let i = 0; i < audioData.length; i++) {
        const hz = i * binHz;
        if (hz >= lowMin && hz <= lowMax) {
          sum += audioData[i] / 255;
          count++;
        }
      }

      bassEnergy = count ? sum / count : 0;

      if (bassAvg === 0) bassAvg = bassEnergy;
      bassAvg = bassAvg * 0.96 + bassEnergy * 0.04;

      const now = performance.now();
      const threshold = Math.max(0.12, bassAvg * 1.45);
      const minInterval = 260;

      const isBeat = bassEnergy > threshold && now - lastBeatTime > minInterval;

      if (isBeat) {
        const interval = now - lastBeatTime;

        if (lastBeatTime > 0 && interval > 300 && interval < 1200) {
          beatIntervals.push(interval);
          if (beatIntervals.length > 8) beatIntervals.shift();

          const avgInterval = beatIntervals.reduce((a, b) => a + b, 0) / beatIntervals.length;
          estimatedBpm = Math.round(60000 / avgInterval);
        }

        lastBeatTime = now;
        beatPulse = 1;
      }

      beatPulse *= 0.88;
      if (beatPulse < 0.01) beatPulse = 0;
    }

    function updateButtons() {
      effectButtons.forEach(btn => {
        btn.classList.toggle("active", activeEffects.has(btn.dataset.effect));
      });
    }

    function toggleEffect(effect) {
      if (activeEffects.has(effect)) {
        activeEffects.delete(effect);
      } else {
        activeEffects.add(effect);
      }

      updateButtons();
      log("Effects: " + (activeEffects.size ? [...activeEffects].join(", ") : "none"));
    }

    function clearEffects() {
      activeEffects.clear();
      updateButtons();
      log("Effects: none");
    }

    effectButtons.forEach(btn => {
      btn.addEventListener("click", () => toggleEffect(btn.dataset.effect));
    });

    clearEffectsBtn.addEventListener("click", clearEffects);

    window.addEventListener("keydown", e => {
      if (e.key === "0") clearEffects();
      if (e.key === "1") toggleEffect("rgb");
      if (e.key === "2") toggleEffect("glitch");
      if (e.key === "3") toggleEffect("mirror");
      if (e.key === "4") toggleEffect("wave");
      if (e.key.toLowerCase() === "s") syncBtn.click();
      if (e.key.toLowerCase() === "f") document.documentElement.requestFullscreen?.();
    });

    function drawCover(source, targetCtx, w, h, mirror = false) {
      const vw = source.videoWidth || 1280;
      const vh = source.videoHeight || 720;
      const scale = Math.max(w / vw, h / vh);
      const sw = vw * scale;
      const sh = vh * scale;
      const x = (w - sw) / 2;
      const y = (h - sh) / 2;

      targetCtx.save();
      if (mirror) {
        targetCtx.translate(w, 0);
        targetCtx.scale(-1, 1);
      }
      targetCtx.drawImage(source, x, y, sw, sh);
      targetCtx.restore();
    }

    function copyCanvas(fromCanvas, toCtx) {
      toCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
      toCtx.drawImage(fromCanvas, 0, 0);
    }

    function applyMirror() {
      copyCanvas(baseCanvas, tempCtx);

      baseCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);

      baseCtx.save();
      baseCtx.translate(baseCanvas.width, 0);
      baseCtx.scale(-1, 1);
      baseCtx.drawImage(tempCanvas, 0, 0);
      baseCtx.restore();

      baseCtx.globalAlpha = 0.35;
      baseCtx.drawImage(tempCanvas, 0, 0);
      baseCtx.globalAlpha = 1;
    }

    function applyWave() {
      copyCanvas(baseCanvas, tempCtx);

      baseCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);

      const syncBoost = syncOn ? beatPulse : 0;
      const sliceH = 4;
      const amp = 18 + syncBoost * 55;
      const speed = syncOn ? 0.13 : 0.08;

      for (let y = 0; y < baseCanvas.height; y += sliceH) {
        const offset = Math.sin(y * 0.05 + t * speed) * amp;
        baseCtx.drawImage(
          tempCanvas,
          0, y, tempCanvas.width, sliceH,
          offset, y, baseCanvas.width, sliceH
        );
      }
    }

    function drawToMain() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
      ctx.filter = "none";

      ctx.drawImage(baseCanvas, 0, 0, canvas.width, canvas.height);

      if (activeEffects.has("rgb")) {
        const shift = 10 + Math.sin(t * 0.08) * 8 + beatPulse * 24;

        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = 0.55;

        ctx.filter = "sepia(1) saturate(8) hue-rotate(-40deg)";
        ctx.drawImage(baseCanvas, shift, 0, canvas.width, canvas.height);

        ctx.filter = "sepia(1) saturate(8) hue-rotate(90deg)";
        ctx.drawImage(baseCanvas, -shift, 0, canvas.width, canvas.height);

        ctx.filter = "sepia(1) saturate(8) hue-rotate(190deg)";
        ctx.drawImage(baseCanvas, 0, shift * 0.5, canvas.width, canvas.height);

        ctx.globalAlpha = 1;
        ctx.filter = "none";
        ctx.globalCompositeOperation = "source-over";
      }

      if (activeEffects.has("glitch")) {
        const syncBoost = syncOn ? beatPulse : 0;
        const strips = syncOn ? Math.round(8 + syncBoost * 35) : 18;
        const probability = syncOn ? 0.18 + syncBoost * 0.65 : 0.55;
        const maxOffset = syncOn ? 35 + syncBoost * 180 : 90;

        for (let i = 0; i < strips; i++) {
          if (Math.random() > probability) continue;

          const y = Math.random() * canvas.height;
          const h = 8 + Math.random() * (25 + syncBoost * 80);
          const xOffset = (Math.random() - 0.5) * maxOffset;

          ctx.drawImage(
            canvas,
            0, y, canvas.width, h,
            xOffset, y, canvas.width, h
          );
        }

        if (Math.random() < 0.04 + syncBoost * 0.55) {
          ctx.globalAlpha = 0.25 + syncBoost * 0.45;
          ctx.fillStyle = "white";
          ctx.fillRect(0, Math.random() * canvas.height, canvas.width, 4 + syncBoost * 12);
          ctx.globalAlpha = 1;
        }
      }

      if (syncOn && isDebugMode) {
        ctx.fillStyle = "rgba(0,0,0,.55)";
        ctx.fillRect(12, 12, 260, 72);
        ctx.fillStyle = "#00ff66";
        ctx.font = "14px monospace";
        ctx.fillText("SYNC ON", 24, 36);
        ctx.fillText("Bass: " + bassEnergy.toFixed(3), 24, 56);
        ctx.fillText("BPM: " + (estimatedBpm || "--"), 24, 76);
      }
    }

    function drawLoop() {
      t++;

      updateAudioSync();

      if (video.readyState >= 2) {
        baseCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);
        drawCover(video, baseCtx, baseCanvas.width, baseCanvas.height, true);

        if (activeEffects.has("mirror")) applyMirror();
        if (activeEffects.has("wave")) applyWave();

        drawToMain();
      } else {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "28px system-ui";
        ctx.fillText("カメラ開始を押してください", 40, 60);
        ctx.font = "18px system-ui";
        ctx.fillText("1 RGB / 2 Glitch / 3 Mirror / 4 Wave / 0 Clear / S Sync / F Fullscreen", 40, 96);
      }

      requestAnimationFrame(drawLoop);
    }

    drawLoop();

    function showEmoji(emoji, x, y) {
      const el = document.createElement("div");
      el.className = "emoji";
      el.textContent = emoji;

      const safeX = Math.min(Math.max(x, 0), 1);
      const safeY = Math.min(Math.max(y, 0), 1);

      el.style.left = `${safeX * window.innerWidth}px`;
      el.style.top = `${safeY * window.innerHeight}px`;

      const size = 72 + Math.random() * 54;
      el.style.fontSize = `${size}px`;

      screen.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 3000);
    }

    try {
      const reactionsRef = ref(db, "reactions");

      const snapshot = await get(reactionsRef);
      log(snapshot.exists() ? "既存データあり。新規送信を待機中..." : "reactionsは空。スマホから送信してください。");

      onChildAdded(reactionsRef, snapshot => {
        const data = snapshot.val();

        if (!data || !data.emoji) return;

        log("受信: " + JSON.stringify(data));

        if (typeof data.x === "number" && typeof data.y === "number") {
          showEmoji(data.emoji, data.x, data.y);
        } else {
          showEmoji(data.emoji, Math.random(), Math.random());
        }
      });

    } catch (e) {
      log("Firebase読取エラー: " + e.message);
    }
  </script>
</body>
</html>
