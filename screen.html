<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Reaction Screen</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    #screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #111, #222);
    }

    .line-v, .line-h {
      position: absolute;
      background: rgba(255,255,255,0.25);
    }
    .line-v {
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
    }
    .line-h {
      top: 50%;
      left: 0;
      height: 2px;
      width: 100%;
    }

    .emoji {
      position: absolute;
      font-size: 72px;
      animation: floatUp 3s ease-out forwards;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(40px) scale(0.7);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-160px) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="screen">
    <div class="line-v"></div>
    <div class="line-h"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const screen = document.getElementById("screen");

    function randomPositionInQuadrant(q) {
      const w = window.innerWidth;
      const h = window.innerHeight;

      const ranges = {
        NW: { xMin: 0,     xMax: w / 2, yMin: 0,     yMax: h / 2 },
        NE: { xMin: w / 2, xMax: w,     yMin: 0,     yMax: h / 2 },
        SW: { xMin: 0,     xMax: w / 2, yMin: h / 2, yMax: h },
        SE: { xMin: w / 2, xMax: w,     yMin: h / 2, yMax: h }
      };

      const r = ranges[q] || ranges.NW;

      return {
        x: r.xMin + Math.random() * (r.xMax - r.xMin - 100),
        y: r.yMin + Math.random() * (r.yMax - r.yMin - 100)
      };
    }

    function showEmoji(emoji, quadrant) {
      const el = document.createElement("div");
      el.className = "emoji";
      el.textContent = emoji;

      const pos = randomPositionInQuadrant(quadrant);
      el.style.left = `${pos.x}px`;
      el.style.top = `${pos.y}px`;

      screen.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 3000);
    }

    onChildAdded(ref(db, "reactions"), snapshot => {
      const data = snapshot.val();
      if (!data || !data.emoji || !data.quadrant) return;

      showEmoji(data.emoji, data.quadrant);
    });
  </script>
</body>
</html>
