<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>MOSW VJ Screen</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    #screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #vjCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #000;
    }

    video { display: none; }

    #message {
      position: absolute;
      top: 34px;
      left: 42px;
      z-index: 4;
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      pointer-events: none;
    }

    #gestureStatus {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      color: white;
      font-size: 12px;
      opacity: 0.75;
      background: rgba(0,0,0,0.35);
      padding: 7px 10px;
      border-radius: 10px;
    }

    #controls {
      position: fixed;
      left: 18px;
      bottom: 14px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(0,0,0,0.35);
      color: white;
      font-size: 12px;
      user-select: none;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button, select, input { font-size: 13px; }

    button {
      border: 0;
      border-radius: 9px;
      padding: 9px 13px;
      background: #ddd;
      color: #111;
      cursor: pointer;
    }

    button.active {
      background: #00d084;
      color: #000;
      font-weight: 700;
    }

    select {
      height: 34px;
      border-radius: 8px;
      padding: 4px;
    }

    input[type="range"] { width: 120px; }

    .mini-label {
      opacity: 0.9;
      font-size: 12px;
    }

    .emoji {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      animation: fly 2.8s ease-out forwards;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
    }

    @keyframes fly {
      0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-65vh) scale(1.9) rotate(360deg); opacity: 0; }
    }
  </style>
</head>

<body>
  <div id="screen">
    <canvas id="vjCanvas"></canvas>
    <video id="cameraA" autoplay playsinline muted></video>
    <video id="cameraB" autoplay playsinline muted></video>

    <div id="message">カメラ開始を押してください</div>
    <div id="gestureStatus">Hand: OFF</div>

    <div id="controls">
      <div class="control-row">
        <button id="startBtn">カメラ開始</button>
        <button class="camBtn active" data-mode="A">A</button>
        <button class="camBtn" data-mode="B">B</button>
        <button class="camBtn" data-mode="split">Split</button>
        <button class="camBtn" data-mode="overlay">Overlay</button>
        <button class="camBtn" data-mode="pip">PiP</button>
        <span class="mini-label">Cam A</span><select id="camSelectA"></select>
        <span class="mini-label">Cam B</span><select id="camSelectB"></select>
        <span class="mini-label">Split</span><input id="splitSlider" type="range" min="10" max="90" value="50">
        <span id="splitLabel">5:5</span>
      </div>

      <div class="control-row">
        <button id="syncBtn">SYNC OFF</button>
        <button id="gestureBtn" class="active">GESTURE ON</button>
        <button id="clearFxBtn" class="active">0 Clear</button>
        <button class="fxBtn" data-fx="rgb">1 RGB</button>
        <button class="fxBtn" data-fx="glitch">2 Glitch</button>
        <button class="fxBtn" data-fx="mirror">3 Mirror</button>
        <button class="fxBtn" data-fx="wave">4 Wave</button>
        <button class="fxBtn" data-fx="mono">5 Mono</button>
        <button class="fxBtn" data-fx="invert">6 Invert</button>
        <button class="fxBtn" data-fx="pixel">7 Pixel</button>
        <button class="fxBtn" data-fx="strobe">8 Strobe</button>
        <button class="fxBtn" data-fx="zoom">9 Zoom</button>
        <span class="mini-label">Power</span><input id="powerSlider" type="range" min="0" max="100" value="55">
      </div>

      <div class="control-row">
        <button class="avatarBtn active" data-avatar="off">Avatar OFF</button>
        <button class="avatarBtn" data-avatar="mesh">Mesh</button>
        <button class="avatarBtn" data-avatar="metallic">Metallic</button>
        <button class="avatarBtn" data-avatar="beer">Beer Bubble</button>
        <button class="avatarBtn" data-avatar="dot">Dot</button>
        <button class="avatarBtn" data-avatar="hologram">Hologram</button>
        <button class="avatarBtn" data-avatar="aura">Aura</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import {
      HandLandmarker,
      PoseLandmarker,
      ImageSegmenter,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const firebaseConfig = {
      apiKey: "AIzaSyD4rBlSp7clQ6Gh_vfSjqiDL-l6fdJsdIM",
      authDomain: "mosw-f855e.firebaseapp.com",
      databaseURL: "https://mosw-f855e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mosw-f855e",
      storageBucket: "mosw-f855e.appspot.com",
      messagingSenderId: "509800323386",
      appId: "1:509800323386:web:4c43a1e9b7a8e9b0f6b3b4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById("vjCanvas");
    const ctx = canvas.getContext("2d", { alpha: false });

    const videoA = document.getElementById("cameraA");
    const videoB = document.getElementById("cameraB");
    const startBtn = document.getElementById("startBtn");
    const syncBtn = document.getElementById("syncBtn");
    const gestureBtn = document.getElementById("gestureBtn");
    const clearFxBtn = document.getElementById("clearFxBtn");
    const camSelectA = document.getElementById("camSelectA");
    const camSelectB = document.getElementById("camSelectB");
    const splitSlider = document.getElementById("splitSlider");
    const splitLabel = document.getElementById("splitLabel");
    const powerSlider = document.getElementById("powerSlider");
    const avatarBtns = document.querySelectorAll(".avatarBtn");
    const message = document.getElementById("message");
    const gestureStatus = document.getElementById("gestureStatus");

    let streamA = null;
    let streamB = null;
    let camMode = "A";
    let activeFx = new Set();
    let split = 0.5;
    let power = 0.55;
    let sync = false;
    let gestureEnabled = true;
    let t = 0;
    let frame = 0;

    let handLandmarker = null;
    let poseLandmarker = null;
    let selfieSegmenter = null;
    let avatarMode = "off";
    let poseResults = null;
    let segmentationResults = null;
    let lastAvatarVideoTime = -1;
    let lastGesture = "";
    let lastGestureTime = 0;

    const fxBuffer = document.createElement("canvas");
    const fxCtx = fxBuffer.getContext("2d");

    const avatarMaskBuffer = document.createElement("canvas");
    const avatarMaskCtx = avatarMaskBuffer.getContext("2d");
    const avatarBodyBuffer = document.createElement("canvas");
    const avatarBodyCtx = avatarBodyBuffer.getContext("2d");
    const avatarFxBuffer = document.createElement("canvas");
    const avatarFxCtx = avatarFxBuffer.getContext("2d");

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    async function initHands() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 2
      });

      poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numPoses: 1
      });

      selfieSegmenter = await ImageSegmenter.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        outputCategoryMask: true,
        outputConfidenceMasks: false
      });

      gestureStatus.textContent = gestureEnabled ? "Hand: ON" : "Hand: OFF";
    }

    async function listCameras() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === "videoinput");

      camSelectA.innerHTML = "";
      camSelectB.innerHTML = "";

      cams.forEach((cam, i) => {
        const label = cam.label || `Camera ${i + 1}`;
        const a = document.createElement("option");
        a.value = cam.deviceId;
        a.textContent = label;
        camSelectA.appendChild(a);

        const b = document.createElement("option");
        b.value = cam.deviceId;
        b.textContent = label;
        camSelectB.appendChild(b);
      });

      if (cams[1]) camSelectB.selectedIndex = 1;
    }

    async function startCamera(video, oldStream, deviceId) {
      if (oldStream) oldStream.getTracks().forEach(t => t.stop());

      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          deviceId: deviceId ? { exact: deviceId } : undefined,
          width: { ideal: 640 },
          height: { ideal: 480 },
          frameRate: { ideal: 30, max: 30 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();
      return stream;
    }

    async function startAllCameras() {
      await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      await listCameras();

      streamA = await startCamera(videoA, streamA, camSelectA.value);
      streamB = await startCamera(videoB, streamB, camSelectB.value);

      if (!handLandmarker) await initHands();

      startBtn.textContent = "カメラON";
      message.style.display = "none";
    }

    startBtn.onclick = async () => {
      try {
        await startAllCameras();
      } catch (e) {
        alert("カメラ起動に失敗しました: " + e.message);
        console.error(e);
      }
    };

    camSelectA.onchange = async () => {
      streamA = await startCamera(videoA, streamA, camSelectA.value);
    };

    camSelectB.onchange = async () => {
      streamB = await startCamera(videoB, streamB, camSelectB.value);
    };

    document.querySelectorAll(".camBtn").forEach(btn => {
      btn.onclick = () => {
        camMode = btn.dataset.mode;
        document.querySelectorAll(".camBtn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      };
    });

    function updateFxButtons() {
      document.querySelectorAll(".fxBtn").forEach(btn => {
        btn.classList.toggle("active", activeFx.has(btn.dataset.fx));
      });
      clearFxBtn.classList.toggle("active", activeFx.size === 0);
    }

    function toggleFx(nextFx) {
      activeFx.has(nextFx) ? activeFx.delete(nextFx) : activeFx.add(nextFx);
      updateFxButtons();
    }

    function clearFx() {
      activeFx.clear();
      updateFxButtons();
    }

    document.querySelectorAll(".fxBtn").forEach(btn => {
      btn.onclick = () => toggleFx(btn.dataset.fx);
    });

    function updateAvatarButtons() {
      avatarBtns.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.avatar === avatarMode);
      });
    }

    function setAvatarMode(nextMode) {
      avatarMode = nextMode;
      updateAvatarButtons();
    }

    avatarBtns.forEach(btn => {
      btn.onclick = () => setAvatarMode(btn.dataset.avatar);
    });

    clearFxBtn.onclick = clearFx;

    syncBtn.onclick = () => {
      sync = !sync;
      syncBtn.textContent = sync ? "SYNC ON" : "SYNC OFF";
      syncBtn.classList.toggle("active", sync);
    };

    gestureBtn.onclick = () => {
      gestureEnabled = !gestureEnabled;
      gestureBtn.textContent = gestureEnabled ? "GESTURE ON" : "GESTURE OFF";
      gestureBtn.classList.toggle("active", gestureEnabled);
      gestureStatus.textContent = gestureEnabled ? "Hand: ON" : "Hand: OFF";
    };

    splitSlider.oninput = () => {
      split = Number(splitSlider.value) / 100;
      const n = Math.round(split * 10);
      splitLabel.textContent = `${n}:${10 - n}`;
    };

    powerSlider.oninput = () => {
      power = Number(powerSlider.value) / 100;
    };

    window.addEventListener("keydown", e => {
      if (e.key === "0") clearFx();
      if (e.key === "1") toggleFx("rgb");
      if (e.key === "2") toggleFx("glitch");
      if (e.key === "3") toggleFx("mirror");
      if (e.key === "4") toggleFx("wave");
      if (e.key === "5") toggleFx("mono");
      if (e.key === "6") toggleFx("invert");
      if (e.key === "7") toggleFx("pixel");
      if (e.key === "8") toggleFx("strobe");
      if (e.key === "9") toggleFx("zoom");
      if (e.key.toLowerCase() === "s") syncBtn.click();
      if (e.key.toLowerCase() === "g") gestureBtn.click();
      if (e.key.toLowerCase() === "f") document.documentElement.requestFullscreen();
    });

    function drawVideoCover(video, x, y, w, h) {
      if (!video.videoWidth || !video.videoHeight) return;
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const scale = Math.max(w / vw, h / vh);
      const sw = w / scale;
      const sh = h / scale;
      const sx = (vw - sw) / 2;
      const sy = (vh - sh) / 2;
      ctx.drawImage(video, sx, sy, sw, sh, x, y, w, h);
    }

    function drawBase(w, h) {
      ctx.fillStyle = sync ? "rgba(0,0,0,0.18)" : "#000";
      ctx.fillRect(0, 0, w, h);

      if (camMode === "A") drawVideoCover(videoA, 0, 0, w, h);
      if (camMode === "B") drawVideoCover(videoB, 0, 0, w, h);

      if (camMode === "split") {
        const leftW = w * split;
        drawVideoCover(videoA, 0, 0, leftW, h);
        drawVideoCover(videoB, leftW, 0, w - leftW, h);
        ctx.fillStyle = "rgba(255,255,255,0.65)";
        ctx.fillRect(leftW - 1, 0, 2, h);
      }

      if (camMode === "overlay") {
        drawVideoCover(videoA, 0, 0, w, h);
        ctx.globalAlpha = 0.25 + power * 0.6;
        drawVideoCover(videoB, 0, 0, w, h);
        ctx.globalAlpha = 1;
      }

      if (camMode === "pip") {
        drawVideoCover(videoA, 0, 0, w, h);
        const pw = w * 0.3;
        const ph = pw * 9 / 16;
        const m = 28;
        drawVideoCover(videoB, w - pw - m, h - ph - m, pw, ph);
        ctx.strokeStyle = "rgba(255,255,255,0.85)";
        ctx.lineWidth = 3;
        ctx.strokeRect(w - pw - m, h - ph - m, pw, ph);
      }
    }

    // Avatar System ---------------------------------------------------------
    const POSE_LINES = [
      [11, 12], [11, 13], [13, 15], [12, 14], [14, 16],
      [11, 23], [12, 24], [23, 24], [23, 25], [25, 27],
      [24, 26], [26, 28], [27, 31], [28, 32]
    ];

    function setAvatarBufferSize(buffer, bufferCtx, w, h) {
      if (buffer.width !== w || buffer.height !== h) {
        buffer.width = w;
        buffer.height = h;
      }
      bufferCtx.setTransform(1, 0, 0, 1, 0, 0);
      bufferCtx.clearRect(0, 0, w, h);
    }

    function getVideoCoverRect(video, w, h) {
      if (!video.videoWidth || !video.videoHeight) return null;
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const scale = Math.max(w / vw, h / vh);
      const dw = vw * scale;
      const dh = vh * scale;
      return { x: (w - dw) / 2, y: (h - dh) / 2, w: dw, h: dh };
    }

    function drawVideoCoverTo(targetCtx, video, x, y, w, h) {
      if (!video.videoWidth || !video.videoHeight) return;
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const scale = Math.max(w / vw, h / vh);
      const sw = w / scale;
      const sh = h / scale;
      const sx = (vw - sw) / 2;
      const sy = (vh - sh) / 2;
      targetCtx.drawImage(video, sx, sy, sw, sh, x, y, w, h);
    }

    function updateAvatarTracking(video) {
      if (!video.videoWidth || !poseLandmarker || !selfieSegmenter) return;
      if (lastAvatarVideoTime === video.currentTime) return;
      lastAvatarVideoTime = video.currentTime;

      const now = performance.now();
      poseResults = poseLandmarker.detectForVideo(video, now);
      if (frame % 3 === 0 || !segmentationResults) {
        segmentationResults = selfieSegmenter.segmentForVideo(video, now);
      }
    }

    function getPoseLandmarks() {
      if (!poseResults || !poseResults.landmarks || !poseResults.landmarks.length) return null;
      return poseResults.landmarks[0];
    }

    function mapPosePoint(point, w, h) {
      return { x: point.x * w, y: point.y * h };
    }

    function getMaskArray(mask) {
      if (!mask) return null;
      if (typeof mask.getAsUint8Array === "function") return mask.getAsUint8Array();
      if (typeof mask.getAsFloat32Array === "function") return mask.getAsFloat32Array();
      return null;
    }

    function buildBodyMask(w, h) {
      setAvatarBufferSize(avatarMaskBuffer, avatarMaskCtx, w, h);
      const categoryMask = segmentationResults && segmentationResults.categoryMask;
      const data = getMaskArray(categoryMask);
      const mw = categoryMask && categoryMask.width;
      const mh = categoryMask && categoryMask.height;
      const rect = getVideoCoverRect(videoA, w, h);
      if (!data || !mw || !mh || !rect) return false;

      const img = avatarMaskCtx.createImageData(mw, mh);
      for (let i = 0; i < data.length; i++) {
        const value = data[i];
        const body = value > 0.5;
        const a = body ? 255 : 0;
        const p = i * 4;
        img.data[p] = 255;
        img.data[p + 1] = 255;
        img.data[p + 2] = 255;
        img.data[p + 3] = a;
      }

      avatarFxBuffer.width = mw;
      avatarFxBuffer.height = mh;
      avatarFxCtx.putImageData(img, 0, 0);
      avatarMaskCtx.imageSmoothingEnabled = true;
      avatarMaskCtx.drawImage(avatarFxBuffer, rect.x, rect.y, rect.w, rect.h);
      return true;
    }

    function buildMaskedBody(w, h) {
      if (!buildBodyMask(w, h)) return false;
      setAvatarBufferSize(avatarBodyBuffer, avatarBodyCtx, w, h);
      drawVideoCoverTo(avatarBodyCtx, videoA, 0, 0, w, h);
      avatarBodyCtx.globalCompositeOperation = "destination-in";
      avatarBodyCtx.drawImage(avatarMaskBuffer, 0, 0, w, h);
      avatarBodyCtx.globalCompositeOperation = "source-over";
      return true;
    }

    function drawAvatar(w, h) {
      if (avatarMode === "off") return;
      if (!videoA.videoWidth) return;
      updateAvatarTracking(videoA);

      if (avatarMode === "mesh") drawMeshAvatar(w, h);
      if (avatarMode === "metallic") drawMetalAvatar(w, h);
      if (avatarMode === "beer") drawBeerAvatar(w, h);
      if (avatarMode === "dot") drawDotAvatar(w, h);
      if (avatarMode === "hologram") drawHologramAvatar(w, h);
      if (avatarMode === "aura") drawAuraAvatar(w, h);
    }

    function drawMeshAvatar(w, h) {
      const lm = getPoseLandmarks();
      if (!lm) return;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.lineWidth = 2;
      ctx.shadowBlur = 18;
      ctx.shadowColor = "rgba(0,255,220,0.95)";
      ctx.strokeStyle = "rgba(0,255,220,0.85)";

      POSE_LINES.forEach(([a, b]) => {
        const p1 = mapPosePoint(lm[a], w, h);
        const p2 = mapPosePoint(lm[b], w, h);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      });

      const shoulders = [mapPosePoint(lm[11], w, h), mapPosePoint(lm[12], w, h)];
      const hips = [mapPosePoint(lm[23], w, h), mapPosePoint(lm[24], w, h)];
      for (let i = 0; i <= 9; i++) {
        const a = i / 9;
        const leftX = shoulders[0].x * (1 - a) + hips[0].x * a;
        const leftY = shoulders[0].y * (1 - a) + hips[0].y * a;
        const rightX = shoulders[1].x * (1 - a) + hips[1].x * a;
        const rightY = shoulders[1].y * (1 - a) + hips[1].y * a;
        ctx.beginPath();
        ctx.moveTo(leftX, leftY);
        ctx.lineTo(rightX, rightY);
        ctx.stroke();
      }

      lm.forEach((p, i) => {
        if (i > 32) return;
        const pt = mapPosePoint(p, w, h);
        ctx.fillStyle = i % 2 ? "rgba(255,0,220,0.9)" : "rgba(0,255,255,0.9)";
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 3 + Math.sin(t * 3 + i) * 1.5, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function drawMetalAvatar(w, h) {
      if (!buildMaskedBody(w, h)) return;
      setAvatarBufferSize(avatarFxBuffer, avatarFxCtx, w, h);
      avatarFxCtx.drawImage(avatarBodyBuffer, 0, 0, w, h);
      avatarFxCtx.globalCompositeOperation = "source-atop";
      const grad = avatarFxCtx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, "rgba(20,22,28,0.95)");
      grad.addColorStop(0.25, "rgba(250,252,255,0.98)");
      grad.addColorStop(0.45, "rgba(90,96,110,0.95)");
      grad.addColorStop(0.62, "rgba(255,255,255,0.98)");
      grad.addColorStop(1, "rgba(40,45,52,0.98)");
      avatarFxCtx.fillStyle = grad;
      avatarFxCtx.fillRect(0, 0, w, h);
      avatarFxCtx.globalAlpha = 0.65;
      avatarFxCtx.fillStyle = "rgba(170,220,255,0.55)";
      for (let x = -w; x < w * 1.4; x += 90) {
        const px = x + (t * 80) % 180;
        avatarFxCtx.fillRect(px, 0, 22, h);
      }
      avatarFxCtx.globalAlpha = 1;
      avatarFxCtx.globalCompositeOperation = "destination-in";
      avatarFxCtx.drawImage(avatarMaskBuffer, 0, 0, w, h);
      avatarFxCtx.globalCompositeOperation = "source-over";
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.drawImage(avatarFxBuffer, 0, 0, w, h);
      ctx.shadowBlur = 28;
      ctx.shadowColor = "rgba(230,245,255,0.8)";
      ctx.drawImage(avatarMaskBuffer, 0, 0, w, h);
      ctx.restore();
    }

    function drawBeerAvatar(w, h) {
      if (!buildBodyMask(w, h)) return;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.drawImage(avatarMaskBuffer, 0, 0, w, h);
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = "rgba(255,178,36,0.2)";
      ctx.fillRect(0, 0, w, h);
      const count = 95;
      for (let i = 0; i < count; i++) {
        const x = ((i * 83 + Math.sin(t + i) * 55) % w + w) % w;
        const y = ((i * 137 - t * (35 + (i % 7) * 8)) % h + h) % h;
        const r = 2 + (i % 9) * 0.8;
        ctx.fillStyle = i % 5 === 0 ? "rgba(255,248,210,0.88)" : "rgba(255,190,45,0.75)";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(255,204,64,0.9)";
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalCompositeOperation = "destination-in";
      ctx.drawImage(avatarMaskBuffer, 0, 0, w, h);
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "rgba(255,255,230,0.9)";
      for (let i = 0; i < 26; i++) {
        const x = (i * 151 + Math.sin(t * 1.7 + i) * 90) % w;
        const y = (h * 0.08 + i * 11 + Math.cos(t + i) * 18) % h;
        ctx.beginPath();
        ctx.arc(x, y, 3 + (i % 4), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawDotAvatar(w, h) {
      if (!buildMaskedBody(w, h)) return;
      const step = 12;
      const img = avatarBodyCtx.getImageData(0, 0, w, h).data;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.shadowBlur = 10;
      for (let y = 0; y < h; y += step) {
        for (let x = 0; x < w; x += step) {
          const idx = ((Math.floor(y) * w) + Math.floor(x)) * 4;
          if (img[idx + 3] < 20) continue;
          const pulse = 0.65 + Math.sin(t * 4 + x * 0.03 + y * 0.02) * 0.35;
          ctx.fillStyle = `rgba(${img[idx]},${img[idx + 1]},${Math.min(255, img[idx + 2] + 90)},${0.55 + pulse * 0.35})`;
          ctx.shadowColor = "rgba(90,255,210,0.8)";
          ctx.beginPath();
          ctx.arc(x, y, 2.2 + pulse * 2.4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawHologramAvatar(w, h) {
      if (!buildMaskedBody(w, h)) return;
      setAvatarBufferSize(avatarFxBuffer, avatarFxCtx, w, h);
      avatarFxCtx.globalAlpha = 0.45;
      avatarFxCtx.drawImage(avatarBodyBuffer, -4, 0, w, h);
      avatarFxCtx.globalCompositeOperation = "screen";
      avatarFxCtx.fillStyle = "rgba(0,80,255,0.45)";
      avatarFxCtx.fillRect(0, 0, w, h);
      avatarFxCtx.drawImage(avatarBodyBuffer, 4, 0, w, h);
      avatarFxCtx.fillStyle = "rgba(0,255,255,0.6)";
      for (let y = (t * 35) % 12; y < h; y += 12) {
        avatarFxCtx.fillRect(0, y, w, 2);
      }
      avatarFxCtx.globalCompositeOperation = "destination-in";
      avatarFxCtx.drawImage(avatarMaskBuffer, 0, 0, w, h);
      avatarFxCtx.globalCompositeOperation = "source-over";
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.shadowBlur = 24;
      ctx.shadowColor = "rgba(0,210,255,0.95)";
      ctx.drawImage(avatarFxBuffer, 0, 0, w, h);
      ctx.restore();
    }

    function drawAuraAvatar(w, h) {
      if (!buildBodyMask(w, h)) return;
      setAvatarBufferSize(avatarFxBuffer, avatarFxCtx, w, h);
      avatarFxCtx.drawImage(avatarMaskBuffer, 0, 0, w, h);
      avatarFxCtx.filter = "blur(22px)";
      for (let i = 0; i < 5; i++) {
        const dx = Math.sin(t * 1.4 + i) * (14 + i * 8);
        const dy = Math.cos(t * 1.2 + i) * (10 + i * 5);
        avatarFxCtx.globalAlpha = 0.22;
        avatarFxCtx.drawImage(avatarMaskBuffer, dx, dy, w, h);
      }
      avatarFxCtx.filter = "none";
      avatarFxCtx.globalCompositeOperation = "source-atop";
      const grad = avatarFxCtx.createRadialGradient(w * 0.5, h * 0.48, 10, w * 0.5, h * 0.5, Math.max(w, h) * 0.55);
      grad.addColorStop(0, "rgba(255,255,255,0.15)");
      grad.addColorStop(0.35, "rgba(0,255,190,0.55)");
      grad.addColorStop(0.7, "rgba(110,60,255,0.5)");
      grad.addColorStop(1, "rgba(0,170,255,0)");
      avatarFxCtx.fillStyle = grad;
      avatarFxCtx.fillRect(0, 0, w, h);
      avatarFxCtx.globalCompositeOperation = "source-over";
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.drawImage(avatarFxBuffer, 0, 0, w, h);
      ctx.strokeStyle = "rgba(170,255,235,0.35)";
      ctx.lineWidth = 2;
      for (let i = 0; i < 22; i++) {
        ctx.beginPath();
        const baseX = (i * 79 + t * 40) % w;
        for (let y = 0; y <= h; y += 28) {
          const x = baseX + Math.sin(y * 0.018 + t * 2 + i) * 38;
          if (y === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      ctx.restore();
    }

    function applyFx(w, h) {
      if (activeFx.size === 0) return;

      if (activeFx.has("rgb")) {
        const shift = 5 + power * 35;
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = 0.45;
        ctx.drawImage(canvas, shift, 0, w, h);
        ctx.drawImage(canvas, -shift, 0, w, h);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = "source-over";
      }

      if (activeFx.has("mirror")) {
        ctx.save();
        ctx.globalAlpha = 0.35 + power * 0.5;
        ctx.translate(w, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(canvas, 0, 0, w, h);
        ctx.restore();
      }

      if (activeFx.has("wave")) {
        fxBuffer.width = w;
        fxBuffer.height = h;
        fxCtx.drawImage(canvas, 0, 0, w, h);
        const amp = 4 + power * 28;
        const freq = 0.012 + power * 0.018;
        for (let y = 0; y < h; y += 6) {
          const dx = Math.sin(y * freq + t) * amp;
          ctx.drawImage(fxBuffer, 0, y, w, 6, dx, y, w, 6);
        }
      }

      if (activeFx.has("glitch")) {
        const glitchInterval = Math.max(5, Math.floor(16 - power * 8));
        if (frame % glitchInterval === 0) {
          const count = 3 + Math.floor(power * 14);
          for (let i = 0; i < count; i++) {
            const y = Math.random() * h;
            const sh = 5 + Math.random() * 28;
            const dx = (Math.random() - 0.5) * power * 90;
            ctx.drawImage(canvas, 0, y, w, sh, dx, y, w, sh);
          }
        }
      }

      if (activeFx.has("mono") || activeFx.has("invert")) {
        const img = ctx.getImageData(0, 0, w, h);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const r = d[i], g = d[i + 1], b = d[i + 2];

          if (activeFx.has("mono")) {
            const gray = (r + g + b) / 3;
            d[i] = r * (1 - power) + gray * power;
            d[i + 1] = g * (1 - power) + gray * power;
            d[i + 2] = b * (1 - power) + gray * power;
          }

          if (activeFx.has("invert")) {
            d[i] = d[i] * (1 - power) + (255 - d[i]) * power;
            d[i + 1] = d[i + 1] * (1 - power) + (255 - d[i + 1]) * power;
            d[i + 2] = d[i + 2] * (1 - power) + (255 - d[i + 2]) * power;
          }
        }
        ctx.putImageData(img, 0, 0);
      }

      if (activeFx.has("pixel")) {
        const scale = 0.04 + (1 - power) * 0.18;
        const sw = Math.max(24, Math.floor(w * scale));
        const sh = Math.max(18, Math.floor(h * scale));
        fxBuffer.width = sw;
        fxBuffer.height = sh;
        fxCtx.imageSmoothingEnabled = false;
        fxCtx.drawImage(canvas, 0, 0, sw, sh);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(fxBuffer, 0, 0, sw, sh, 0, 0, w, h);
        ctx.imageSmoothingEnabled = true;
      }

      if (activeFx.has("strobe")) {
        const flash = Math.sin(t * (1.5 + power * 5)) > 0.82;
        if (flash) {
          ctx.fillStyle = `rgba(255,255,255,${0.18 + power * 0.45})`;
          ctx.fillRect(0, 0, w, h);
        }
      }

      if (activeFx.has("zoom")) {
        const z = 1 + power * 0.08 + Math.sin(t * 1.5) * power * 0.025;
        fxBuffer.width = w;
        fxBuffer.height = h;
        fxCtx.drawImage(canvas, 0, 0, w, h);
        ctx.globalAlpha = 0.45 + power * 0.35;
        ctx.drawImage(fxBuffer, (w - w * z) / 2, (h - h * z) / 2, w * z, h * z);
        ctx.globalAlpha = 1;
      }
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function isExtended(lm, tip, pip) {
      return lm[tip].y < lm[pip].y;
    }

    function detectGesture(lm) {
      const thumbTip = lm[4];
      const indexTip = lm[8];
      const middleTip = lm[12];
      const ringTip = lm[16];
      const pinkyTip = lm[20];

      const indexExt = isExtended(lm, 8, 6);
      const middleExt = isExtended(lm, 12, 10);
      const ringExt = isExtended(lm, 16, 14);
      const pinkyExt = isExtended(lm, 20, 18);

      const okDist = dist(thumbTip, indexTip);
      const palmSize = dist(lm[0], lm[9]);

      if (okDist < palmSize * 0.38 && middleExt && ringExt && pinkyExt) return "OK";
      if (indexExt && middleExt && !ringExt && !pinkyExt && dist(indexTip, middleTip) > palmSize * 0.35) return "PEACE";
      if (thumbTip.y < lm[3].y && !indexExt && !middleExt && !ringExt && !pinkyExt) return "GOOD";
      if (indexExt && middleExt && dist(indexTip, middleTip) < palmSize * 0.35) return "HEART";

      return "";
    }

    function handleHands() {
      if (!gestureEnabled) {
        gestureStatus.textContent = "Hand: OFF";
        return;
      }

      if (!handLandmarker || !videoA.videoWidth) return;
      if (frame % 5 !== 0) return;

      const result = handLandmarker.detectForVideo(videoA, performance.now());
      if (!result.landmarks || result.landmarks.length === 0) {
        gestureStatus.textContent = "Hand: ON";
        return;
      }

      for (const lm of result.landmarks) {
        const gesture = detectGesture(lm);
        if (!gesture) continue;

        const now = performance.now();
        if (gesture === lastGesture && now - lastGestureTime < 1600) return;

        lastGesture = gesture;
        lastGestureTime = now;
        gestureStatus.textContent = "Gesture: " + gesture;

        if (gesture === "OK") burstEmoji("👌", 7);
        if (gesture === "PEACE") burstEmoji("✌️", 7);
        if (gesture === "HEART") burstEmoji("❤️", 9);
        if (gesture === "GOOD") burstEmoji("👍", 7);
      }
    }

    function loop() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      t += 0.05;
      frame++;

      drawBase(w, h);
      drawAvatar(w, h);
      applyFx(w, h);
      handleHands();

      requestAnimationFrame(loop);
    }

    function spawnEmoji(char) {
      const el = document.createElement("div");
      el.className = "emoji";
      el.textContent = char;
      el.style.fontSize = 36 + Math.random() * 70 + "px";
      el.style.left = Math.random() * 92 + "vw";
      el.style.bottom = "-10vh";
      document.getElementById("screen").appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function burstEmoji(char, n) {
      for (let i = 0; i < n; i++) {
        setTimeout(() => spawnEmoji(char), i * 80);
      }
    }

    function normalizeEmojiPayload(data) {
      if (!data) return [];
      if (Array.isArray(data.emojis)) return data.emojis;
      if (typeof data.emoji === "string") return [data.emoji];
      if (typeof data === "string") return [data];
      return [];
    }

    onChildAdded(ref(db, "reactions"), snapshot => {
      const emojis = normalizeEmojiPayload(snapshot.val());
      emojis.slice(0, 15).forEach((e, i) => {
        setTimeout(() => spawnEmoji(e), i * 70);
      });
    });

    updateFxButtons();
    updateAvatarButtons();
    loop();
  </script>
</body>
</html>
