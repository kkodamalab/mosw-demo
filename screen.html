<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>MOSW Avatar Effects</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    #screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    video {
      display: none;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      width: min(96vw, 900px);
      pointer-events: auto;
    }

    button {
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(0,0,0,0.48);
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      backdrop-filter: blur(8px);
      cursor: pointer;
    }

    button.active {
      background: rgba(0, 255, 220, 0.28);
      border-color: rgba(0, 255, 220, 0.85);
      box-shadow: 0 0 18px rgba(0, 255, 220, 0.45);
    }

    #startBtn {
      position: absolute;
      z-index: 20;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      padding: 14px 24px;
    }
  </style>
</head>

<body>
  <div id="screen">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>

    <button id="startBtn">CAMERA ON</button>

    <div id="ui">
      <button data-mode="mesh" class="active">Mesh</button>
      <button data-mode="metal">Metallic</button>
      <button data-mode="beer">Beer Bubble</button>
      <button data-mode="dot">Dot</button>
      <button data-mode="hologram">Hologram</button>
      <button data-mode="aura">Aura</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("startBtn");
    const buttons = document.querySelectorAll("#ui button");

    let mode = "mesh";
    let landmarks = null;
    let t = 0;
    let particles = [];

    const POSE_CONNECTIONS = [
      [11,12], [11,13], [13,15], [12,14], [14,16],
      [11,23], [12,24], [23,24],
      [23,25], [25,27], [24,26], [26,28],
      [27,29], [29,31], [28,30], [30,32],
      [15,17], [15,19], [15,21],
      [16,18], [16,20], [16,22]
    ];

    buttons.forEach(btn => {
      btn.onclick = () => {
        mode = btn.dataset.mode;
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      };
    });

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    const pose = new Pose({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults(results => {
      landmarks = results.poseLandmarks || null;
    });

    startBtn.onclick = async () => {
      startBtn.style.display = "none";

      const camera = new Camera(video, {
        onFrame: async () => {
          await pose.send({ image: video });
        },
        width: 1280,
        height: 720
      });

      camera.start();
      animate();
    };

    function p(lm) {
      return {
        x: (1 - lm.x) * canvas.width,
        y: lm.y * canvas.height,
        z: lm.z || 0,
        v: lm.visibility ?? 1
      };
    }

    function getPoints() {
      if (!landmarks) return [];
      return landmarks.map(p);
    }

    function clear() {
      ctx.fillStyle = "rgba(0,0,0,0.24)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawVideoGhost() {
      ctx.save();
      ctx.globalAlpha = 0.16;
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function drawSkeleton(points, color = "#00ffe0", width = 2) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.shadowBlur = 18;
      ctx.shadowColor = color;

      for (const [a, b] of POSE_CONNECTIONS) {
        if (!points[a] || !points[b]) continue;
        if (points[a].v < 0.35 || points[b].v < 0.35) continue;
        ctx.beginPath();
        ctx.moveTo(points[a].x, points[a].y);
        ctx.lineTo(points[b].x, points[b].y);
        ctx.stroke();
      }

      for (const pt of points) {
        if (pt.v < 0.35) continue;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }
      ctx.restore();
    }

    function drawMesh(points) {
      drawSkeleton(points, "#00ffe0", 2);

      ctx.save();
      ctx.strokeStyle = "rgba(0,255,220,0.25)";
      ctx.lineWidth = 1;

      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          const a = points[i], b = points[j];
          if (a.v < 0.45 || b.v < 0.45) continue;
          const d = Math.hypot(a.x - b.x, a.y - b.y);
          if (d < 150) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      ctx.restore();
    }

    function drawMetal(points) {
      ctx.save();
      ctx.lineCap = "round";
      const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      g.addColorStop(0, "#ffffff");
      g.addColorStop(0.35, "#777777");
      g.addColorStop(0.65, "#d8d8d8");
      g.addColorStop(1, "#444444");

      ctx.shadowBlur = 24;
      ctx.shadowColor = "rgba(255,255,255,0.7)";
      drawSkeleton(points, g, 10);

      ctx.globalAlpha = 0.45;
      drawSkeleton(points, "#ffffff", 2);
      ctx.restore();
    }

    function drawBeer(points) {
      drawSkeleton(points, "rgba(255,190,40,0.55)", 3);

      for (const pt of points) {
        if (pt.v < 0.4) continue;
        for (let i = 0; i < 3; i++) {
          particles.push({
            x: pt.x + (Math.random() - 0.5) * 28,
            y: pt.y + (Math.random() - 0.5) * 28,
            vx: (Math.random() - 0.5) * 1.2,
            vy: -Math.random() * 2.2 - 0.4,
            r: Math.random() * 8 + 3,
            life: 80,
            color: Math.random() > 0.35 ? "rgba(255,230,150," : "rgba(255,170,30,"
          });
        }
      }

      drawParticles();
    }

    function drawDot(points) {
      ctx.save();
      ctx.fillStyle = "#00f7ff";
      ctx.shadowBlur = 14;
      ctx.shadowColor = "#00f7ff";

      for (const [a, b] of POSE_CONNECTIONS) {
        const pa = points[a], pb = points[b];
        if (!pa || !pb || pa.v < 0.4 || pb.v < 0.4) continue;

        const steps = 18;
        for (let i = 0; i <= steps; i++) {
          const r = i / steps;
          const x = pa.x + (pb.x - pa.x) * r;
          const y = pa.y + (pb.y - pa.y) * r;
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawHologram(points) {
      ctx.save();
      ctx.globalAlpha = 0.95;

      for (let offset of [-8, 0, 8]) {
        ctx.save();
        ctx.translate(offset, 0);
        drawSkeleton(points, offset === 0 ? "#00fff0" : "rgba(255,0,180,0.45)", 2);
        ctx.restore();
      }

      ctx.strokeStyle = "rgba(0,255,240,0.18)";
      ctx.lineWidth = 1;
      for (let y = 0; y < canvas.height; y += 14) {
        ctx.beginPath();
        ctx.moveTo(0, y + Math.sin(t * 0.04 + y * 0.03) * 8);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawAura(points) {
      if (!points.length) return;

      const visible = points.filter(pt => pt.v > 0.4);
      if (!visible.length) return;

      const cx = visible.reduce((s, pt) => s + pt.x, 0) / visible.length;
      const cy = visible.reduce((s, pt) => s + pt.y, 0) / visible.length;

      ctx.save();
      for (let i = 0; i < 5; i++) {
        const r = 90 + i * 55 + Math.sin(t * 0.03 + i) * 18;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        g.addColorStop(0, "rgba(0,255,180,0.10)");
        g.addColorStop(0.55, "rgba(255,220,80,0.08)");
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      drawSkeleton(points, "rgba(255,255,180,0.85)", 3);
    }

    function drawParticles() {
      ctx.save();
      for (const q of particles) {
        q.x += q.vx;
        q.y += q.vy;
        q.life--;

        ctx.fillStyle = `${q.color}${q.life / 80})`;
        ctx.beginPath();
        ctx.arc(q.x, q.y, q.r, 0, Math.PI * 2);
        ctx.fill();
      }
      particles = particles.filter(q => q.life > 0);
      ctx.restore();
    }

    function animate() {
      t++;
      clear();
      drawVideoGhost();

      const points = getPoints();

      if (points.length) {
        if (mode === "mesh") drawMesh(points);
        if (mode === "metal") drawMetal(points);
        if (mode === "beer") drawBeer(points);
        if (mode === "dot") drawDot(points);
        if (mode === "hologram") drawHologram(points);
        if (mode === "aura") drawAura(points);
      } else {
        drawParticles();
      }

      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
